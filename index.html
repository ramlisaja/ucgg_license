<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCGG License Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animated {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 25%, #0d1b3e 50%, #1a0a2e 75%, #0a0a1a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatParticle linear infinite;
            opacity: 0.3;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% {
                transform: translateY(-10vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Glass Effect */
        .glass {
            background: rgba(13, 17, 38, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(138, 43, 226, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1;
        }

        .glass:hover {
            border-color: rgba(138, 43, 226, 0.4);
            box-shadow: 0 8px 40px rgba(138, 43, 226, 0.15);
            transition: all 0.4s ease;
        }

        /* Gradient Text */
        .gradient-text {
            background: linear-gradient(135deg, #a855f7, #6366f1, #3b82f6, #a855f7);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientText 4s ease infinite;
        }

        @keyframes gradientText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Glow Border */
        .glow-border {
            position: relative;
        }

        .glow-border::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 12px;
            background: linear-gradient(135deg, #a855f7, #6366f1, #3b82f6);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .glow-border:hover::before {
            opacity: 1;
        }

        /* Stats Card */
        .stat-card {
            background: rgba(13, 17, 38, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 43, 226, 0.15);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.05), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .stat-card:hover::after {
            opacity: 1;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            border-color: rgba(138, 43, 226, 0.4);
            box-shadow: 0 12px 40px rgba(138, 43, 226, 0.15);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 12px;
        }

        .stat-icon-purple { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
        .stat-icon-blue { background: rgba(99, 102, 241, 0.2); color: #6366f1; }
        .stat-icon-cyan { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .stat-icon-pink { background: rgba(236, 72, 153, 0.2); color: #ec4899; }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Badge Status */
        .badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-active { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-expired { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-inactive { background: rgba(107, 114, 128, 0.2); color: #9ca3af; border: 1px solid rgba(107, 114, 128, 0.3); }
        .badge-exhausted { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }

        /* Table */
        .table-container {
            border-radius: 16px;
            overflow: hidden;
        }

        .table-container table {
            width: 100%;
            border-collapse: collapse;
        }

        .table-container th {
            background: rgba(168, 85, 247, 0.1);
            color: #a855f7;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 16px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(138, 43, 226, 0.1);
        }

        .table-container td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(138, 43, 226, 0.05);
            color: #e5e7eb;
            font-size: 13px;
        }

        .table-container tr:hover td {
            background: rgba(168, 85, 247, 0.05);
        }

        /* License Key Copy */
        .license-key {
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #a855f7;
            border: 1px solid rgba(168, 85, 247, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .license-key:hover {
            border-color: #a855f7;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: white;
            padding: 10px 24px;
            border-radius: 10px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(168, 85, 247, 0.3);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(239, 68, 68, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
            border-color: rgba(239, 68, 68, 0.4);
        }

        /* Inputs */
        .input-field {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(138, 43, 226, 0.15);
            border-radius: 10px;
            padding: 10px 16px;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.1);
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        select.input-field option {
            background: #1a1a2e;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            padding: 16px 24px;
            border-radius: 12px;
            background: rgba(13, 17, 38, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(138, 43, 226, 0.3);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            transform: translateX(120%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 400px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-success { border-color: rgba(16, 185, 129, 0.4); }
        .toast-error { border-color: rgba(239, 68, 68, 0.4); }
        .toast-info { border-color: rgba(59, 130, 246, 0.4); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(13, 17, 38, 0.5); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #a855f7, #6366f1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg, #7c3aed, #4f46e5); }

        /* Responsive */
        @media (max-width: 768px) {
            .stat-number { font-size: 22px; }
            .table-container { overflow-x: auto; }
            .toast { bottom: 20px; right: 20px; left: 20px; max-width: none; }
        }
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-animated"></div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <div id="toastMessage" style="color: white; font-weight: 500;"></div>
    </div>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-8 relative z-10">

        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-4xl md:text-5xl font-bold gradient-text">
                    <i class="fas fa-crown mr-3"></i>UCGG License
                </h1>
                <p class="text-gray-400 mt-2 text-sm md:text-base">
                    <i class="fas fa-shield-alt mr-2 text-purple-400"></i>
                    Premium License Management System
                </p>
            </div>
            <div class="flex gap-3">
                <button onclick="refreshData()" class="glass px-5 py-2.5 rounded-xl text-white hover:border-purple-400 transition flex items-center gap-2">
                    <i class="fas fa-sync-alt"></i>
                    <span class="hidden sm:inline">Refresh</span>
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="stat-card">
                <div class="stat-icon stat-icon-purple"><i class="fas fa-check-circle"></i></div>
                <div class="stat-number" id="statActive">0</div>
                <div class="text-gray-400 text-sm mt-1">Active Licenses</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-blue"><i class="fas fa-times-circle"></i></div>
                <div class="stat-number" id="statExpired" style="background: linear-gradient(135deg, #6366f1, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">0</div>
                <div class="text-gray-400 text-sm mt-1">Expired</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-cyan"><i class="fas fa-database"></i></div>
                <div class="stat-number" id="statTotal" style="background: linear-gradient(135deg, #3b82f6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">0</div>
                <div class="text-gray-400 text-sm mt-1">Total Generated</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-pink"><i class="fas fa-rocket"></i></div>
                <div class="stat-number" id="statUsed" style="background: linear-gradient(135deg, #ec4899, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">0</div>
                <div class="text-gray-400 text-sm mt-1">Total Uses</div>
            </div>
        </div>

        <!-- Create License -->
        <div class="glass rounded-2xl p-6 md:p-8 mb-8 glow-border">
            <h2 class="text-xl font-bold text-white mb-6">
                <i class="fas fa-plus-circle text-purple-400 mr-3"></i>Generate New License
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="text-sm text-gray-400 block mb-2">
                        <i class="fas fa-calendar-day mr-2 text-purple-400"></i>Expiry Days
                    </label>
                    <input type="number" id="expiryDays" value="30" min="1" max="365"
                           class="input-field">
                </div>
                <div>
                    <label class="text-sm text-gray-400 block mb-2">
                        <i class="fas fa-crown mr-2 text-purple-400"></i>Plan
                    </label>
                    <select id="plan" class="input-field">
                        <option value="premium">💎 Premium</option>
                        <option value="standard">⭐ Standard</option>
                        <option value="trial">🆓 Trial</option>
                    </select>
                </div>
                <div>
                    <label class="text-sm text-gray-400 block mb-2">
                        <i class="fas fa-sticky-note mr-2 text-purple-400"></i>Note
                    </label>
                    <input type="text" id="note" placeholder="Optional note..." class="input-field">
                </div>
                <div class="flex items-end">
                    <button onclick="createLicense()" class="btn-primary w-full flex items-center justify-center gap-2">
                        <i class="fas fa-magic"></i> Generate
                    </button>
                </div>
            </div>
        </div>

        <!-- License List -->
        <div class="glass rounded-2xl p-6 md:p-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-xl font-bold text-white">
                    <i class="fas fa-list-ul text-purple-400 mr-3"></i>License List
                </h2>
                <div class="flex gap-3 w-full md:w-auto">
                    <input type="text" id="searchInput" placeholder="🔍 Search license..." 
                           class="input-field w-full md:w-64" oninput="filterLicenses()">
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th><i class="fas fa-key mr-2"></i>License Key</th>
                            <th><i class="fas fa-crown mr-2"></i>Plan</th>
                            <th><i class="fas fa-circle mr-2"></i>Status</th>
                            <th><i class="fas fa-chart-bar mr-2"></i>Uses</th>
                            <th><i class="fas fa-clock mr-2"></i>Days Left</th>
                            <th><i class="fas fa-cog mr-2"></i>Action</th>
                        </tr>
                    </thead>
                    <tbody id="licenseTable"></tbody>
                </table>
            </div>

            <div id="emptyState" class="text-center py-12 text-gray-400 hidden">
                <i class="fas fa-inbox text-5xl mb-4 opacity-30"></i>
                <p class="text-lg font-medium">No licenses generated yet</p>
                <p class="text-sm mt-1 opacity-60">Create your first license above</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center text-gray-500 text-xs mt-8 opacity-50">
            <i class="fas fa-shield-alt mr-1"></i> UCGG License Manager v2.0 • Secured
        </div>
    </div>

    <script>
        const API_URL = 'https://ucgg-license-key.vercel.app/api';
        const ADMIN_SECRET = 'ucgg_super_secret_2024';
        let allLicenses = [];

        // ===== PARTICLES =====
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#a855f7', '#6366f1', '#3b82f6', '#8b5cf6', '#7c3aed', '#4f46e5'];
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.animationDuration = (Math.random() * 20 + 15) + 's';
                particle.style.animationDelay = (Math.random() * 20) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // ===== TOAST =====
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const msg = document.getElementById('toastMessage');
            toast.className = `toast toast-${type}`;
            msg.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // ===== API =====
        async function fetchLicenses() {
            try {
                const res = await fetch(`${API_URL}/licenses`, {
                    headers: { 'Authorization': `Bearer ${ADMIN_SECRET}` }
                });
                const data = await res.json();
                allLicenses = data.licenses || [];
                return allLicenses;
            } catch {
                showToast('Failed to fetch licenses', 'error');
                return [];
            }
        }

        function filterLicenses() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allLicenses.filter(l => 
                l.key.toLowerCase().includes(search) ||
                l.plan.toLowerCase().includes(search) ||
                l.status.toLowerCase().includes(search)
            );
            renderLicenses(filtered);
        }

        async function refreshData() {
            const licenses = await fetchLicenses();
            renderLicenses(licenses);
            updateStats(licenses);
            showToast('Data refreshed!', 'info');
        }

        function renderLicenses(licenses) {
            const tbody = document.getElementById('licenseTable');
            const empty = document.getElementById('emptyState');

            if (!licenses || licenses.length === 0) {
                tbody.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            tbody.innerHTML = licenses.map(l => {
                const daysLeft = Math.ceil((new Date(l.expiryDate) - new Date()) / (86400000));
                const statusClass = `badge-${l.status}`;
                const statusIcon = {
                    'active': 'fa-check-circle text-green-400',
                    'expired': 'fa-times-circle text-red-400',
                    'inactive': 'fa-minus-circle text-gray-400',
                    'exhausted': 'fa-exclamation-triangle text-yellow-400'
                }[l.status] || 'fa-circle text-gray-400';

                return `
                    <tr>
                        <td>
                            <div class="license-key" onclick="copyKey('${l.key}')" title="Click to copy">
                                <i class="fas fa-copy mr-2 text-purple-400"></i>
                                ${l.key}
                            </div>
                        </td>
                        <td>
                            <span class="px-3 py-1 bg-purple-500/10 rounded-full text-purple-400 text-xs font-semibold border border-purple-500/20">
                                ${l.plan}
                            </span>
                        </td>
                        <td>
                            <span class="badge ${statusClass}">
                                <i class="fas ${statusIcon.split(' ')[0]} mr-1"></i>
                                ${l.status}
                            </span>
                        </td>
                        <td class="text-gray-300">
                            ${l.currentUses} <span class="text-gray-500">/</span> ${l.maxUses}
                        </td>
                        <td class="${daysLeft > 0 ? 'text-green-400' : 'text-red-400'}">
                            ${daysLeft > 0 ? daysLeft + ' days' : 'Expired'}
                        </td>
                        <td>
                            <button onclick="deleteLicense('${l.key}')" class="btn-danger flex items-center gap-1">
                                <i class="fas fa-trash-alt"></i> Delete
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateStats(licenses) {
            const active = licenses.filter(l => l.status === 'active').length;
            const expired = licenses.filter(l => l.status === 'expired').length;
            const total = licenses.length;
            const used = licenses.reduce((sum, l) => sum + (l.currentUses || 0), 0);

            document.getElementById('statActive').textContent = active;
            document.getElementById('statExpired').textContent = expired;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statUsed').textContent = used;
        }

        // ===== CREATE LICENSE =====
        async function createLicense() {
            const expiryDays = parseInt(document.getElementById('expiryDays').value) || 30;
            const plan = document.getElementById('plan').value;
            const note = document.getElementById('note').value.trim();

            try {
                const res = await fetch(`${API_URL}/licenses`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${ADMIN_SECRET}`
                    },
                    body: JSON.stringify({ expiryDays, plan, note })
                });
                const data = await res.json();

                if (data.success) {
                    showToast(`✅ License created: ${data.license.key}`, 'success');
                    document.getElementById('note').value = '';
                    refreshData();
                } else {
                    showToast('❌ Failed to create license', 'error');
                }
            } catch {
                showToast('❌ Failed to create license', 'error');
            }
        }

        // ===== DELETE LICENSE =====
        async function deleteLicense(key) {
            if (!confirm(`Delete license ${key}?`)) return;

            try {
                const res = await fetch(`${API_URL}/licenses?key=${key}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${ADMIN_SECRET}` }
                });
                const data = await res.json();

                if (data.success) {
                    showToast(`🗑️ License ${key} deleted`, 'info');
                    refreshData();
                } else {
                    showToast('❌ Failed to delete license', 'error');
                }
            } catch {
                showToast('❌ Failed to delete license', 'error');
            }
        }

        // ===== COPY KEY =====
        function copyKey(key) {
            navigator.clipboard.writeText(key).then(() => {
                showToast(`📋 Copied: ${key}`, 'success');
            }).catch(() => {
                // Fallback
                const input = document.createElement('input');
                input.value = key;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast(`📋 Copied: ${key}`, 'success');
            });
        }

        // ===== AUTO REFRESH =====
        refreshData();
        setInterval(refreshData, 30000);
    </script>

</body>
</html>
